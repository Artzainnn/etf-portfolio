name: Daily data refresh + deploy

on:
  # 23:30 UTC = ~07:30 Singapore — fresh after US market close
  schedule:
    - cron: "30 23 * * *"
  # Also allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Use the default GITHUB_TOKEN to commit back to main
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh ETF data from Yahoo
        run: npm run db:refresh-etfs-static

      - name: Refresh stock data from Yahoo
        run: npm run db:refresh-stocks

      - name: Commit fresh data if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/ public/data/)" ]; then
            git add data/ public/data/
            git commit -m "chore: daily refresh of market data $(date -u +%Y-%m-%d)"
            git push
            echo "Pushed. Live site will pick up the new data within ~30 min via the GitHub-raw fetch with Next.js revalidate."
          else
            echo "No data changes — nothing to do."
          fi
